name: Build Installer

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "release-*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-installer:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\VRDeveloperUtility.csproj

      - name: Build MSI
        shell: pwsh
        run: .\scripts\build-installer.ps1

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: VRDeveloperUtilitySetup
          path: dist\installer\VRDeveloperUtilitySetup.msi
          if-no-files-found: error
